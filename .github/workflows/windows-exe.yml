name: Build Windows Installer

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Renderer
        run: npm run build

      - name: Build NSIS Installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --win nsis --config.win.signAndEditExecutable=false --publish never

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: edufixer-windows-installer
          path: |
            release/*Setup*.exe
            release/latest.yml
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14

      - name: Publish Release Asset (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*Setup*.exe
            release/latest.yml
            release/*.blockmap
